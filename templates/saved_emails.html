<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style6.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Montenegrin+Gothic+One&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Email Blaster</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-dark me-2" style='width: 115px;' href="{{url_for('frontend')}}">Home Page</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-dark me-2" style='width: 115px;' href="{{url_for('admin_page')}}">Admin Page</a>
                    </li>
                    <li class="nav-item">
                        {% if current_user.is_authenticated %}
                        <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                        {% endif %}
                    </li>
                </ul>
            </div>
        </div>
    </nav> 


    <h1 class = "text-center" id = "header" style = "margin-top: 20px;">Edit Saved Email</h1>

  

     
            <div class = "flex-wrapper">
            <div class="card login-card">
                <div class="card-header">Email Editor</div>
                    <div class="card-body" id='form'>
                        <form action="{{url_for('saved_emails', email_unique_id=email_unique_id)}}" method="POST" enctype="multipart/form-data">
                            


                            <div class="form-group">
                                <label for="subject">Subject: </label>
                                <input type="text" class="form-control" name="subject" id="subject"
                                    placeholder="Subject" value="{{data.get('subject', '')}}" required>
                            </div>

                            <div class="form-group">
                                <label for="emailContent">Email Content: </label>
                                <textarea class="form-control" name="emailContent"
                                    id="emailContent" required>{{data.get('emailContent', '')}}</textarea>
                            </div>
                            <!--
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" name = "HtmlButton" id="HtmlButton">
                        <label class="form-check-label" for="HtmlButton"> HTML Format</label>
                    </div>-->

                        <button type="submit" name="action_type" value="update"
                                class="btn btn-primary">Update</button>
                            <button type="submit" name="action_type" value="confirm"
                                class="btn btn-primary">Confirm</button>
                            
                        </form>
                    </div>
                </div>
            
         
            
        </div>

    </div>


    <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2026 California Business Technology. All rights reserved.</p>
      <p>Created by Rena</p>
    </div>
  </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300 // Sets the visual height of the editing area
            });
        });

        var socket = io()
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            document.getElementById('confirmation_counter').innerText = data.amount;
        });

        dropdown.addEventListener('change', function () {

                preset_csv.classList.remove('d-none');
            } else if (this.value === 'custom_csv') {
                custom_csv.classList.remove('d-none');
            }
        });*/

    </script>

</body>

</html>
