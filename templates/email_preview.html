<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand" href="/">Email Blaster</a>
        </div>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="btn btn-dark" style='width: 115px;' href="{{url_for('admin_page')}}">Admin Page</a>
            </li>
            <li class="nav-item">
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
                {% endif %}
            </li>
        </ul>
    </nav>
    <div>
        <h1>{{subject}}</h1>
    </div>
    <iframe srcdoc="{{html_body}}" style = "width: 100%; height: 600px; border: none;"></iframe>


</body>

</html>
