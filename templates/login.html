<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body>


    <div class="login-card">
        <h1 class="login-title">Email Blaster Login</h1>

        <form id="login-form" method="POST">
            <div class="mb-3">
                <input class="form-control" type="text" name="username" placeholder="Username">
            </div>
            <div class="mb-3">
                <input class="form-control" type="password" name="password" placeholder="Password">
            </div>
            <div class="mb-3">
                <button type="submit" id="loginButton" value="Login" class="btn btn-secondary">Login</button>
                <div id="message" class="message"></div>
            </div>
            
           

            {% if error %}
            <p id = "error" class="error alert alert-danger" role="alert">{{ error }}</p>
            {% endif %}

             {% if remaining > 0 %}
            <div id="countdown" class="alert alert-danger countdown " role="alert">Countdown: {{ remaining }} seconds.</div>
            <script>
                let seconds = Number("{{remaining}}") || 0;
                const countdownElement = document.getElementById('countdown');
                const loginButton = document.getElementById("loginButton");
                const errorButton = document.getElementById("error");

                console.log(`Seconds left: ${seconds}`);
                const timer = setInterval(() => {
                    if (seconds > 0) {
                        if (loginButton) {
                            loginButton.disabled = true;
                        }
                        if (countdownElement) {
                            countdownElement.textContent = `Countdown: ${seconds} seconds.`;
                        }
                        seconds--;
                    } else {
                        clearInterval(timer);
                        if (countdownElement) {
                            countdownElement.remove();
                            errorButton.remove();
                        }
                        if (loginButton) {
                            loginButton.disabled = false;
                        }
                    }
                }, 1000);
            </script>

            
            {% endif %}

        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 California Business Technology. All rights reserved.</p>
            <p>Created by Rena</p>
        </div>
    </footer>

</body>
