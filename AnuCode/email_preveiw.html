<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster - Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    
</head>

<body>

    <div class="sidebar">
        <a class="sidebar-brand" href="/">Email Blaster</a>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="{{url_for('frontend')}}">Home Page</a></li>
            <li><a class="sidebar-link" href="{{url_for('admin_page')}}">Admin Page</a></li>
        </ul>
        <div class="sidebar-footer">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('logout') }}" class="btn btn-sidebar-danger">Logout</a>
            {% endif %}
        </div>
    </div>

    <div class="main-content-wrapper">
        <h1 class="preview-header-title">Subject: {{subject}}</h1>
        <div class="iframe-container">
            <iframe srcdoc="{{html_body}}" style="width: 100%; height: 600px; border: none; border-radius: 12px;"></iframe>
        </div>
    </div>

</body>

</html>
