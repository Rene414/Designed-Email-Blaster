<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Blaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style2.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    
</head>

<body>

    <div class="sidebar">
        <a id = "sidebar-name" class="sidebar-brand" href="/">Email Blaster</a>
        <ul class="sidebar-menu">
            <li><a class="sidebar-link" href="{{url_for('frontend')}}">Home Page</a></li>
            <li><a class="sidebar-link active" href="#">Create Email</a></li>
            <li><a class="sidebar-link" href="{{url_for('admin_page')}}">Admin Page</a></li>
        </ul>
        <div class="sidebar-footer">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('logout') }}" class="btn btn-sidebar-danger">Logout</a>
            {% endif %}
        </div>
    </div>

    <div class="main-content-wrapper">
        <main class="main-content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-lg-12">
                        <div class="glass-card">
                            <h1 class="mb-4">Create New Email Campaign</h1>
                            <form id="create-email-form" onsubmit="disableButtons()" action="{{url_for('create_email')}}"
                                method="POST" enctype="multipart/form-data">

                                <div class="mb-4">
                                    <label for="subject" class="form-label">Subject Line</label>
                                    <input type="text" class="form-control" name="subject" id="subject"
                                        placeholder="Enter email subject hook..." required>
                                </div>

                                <div class="mb-4">
                                    <label for="emailContent" class="form-label">Email Content Body</label>
                                    <textarea class="form-control" name="emailContent" id="emailContent"
                                        required></textarea>
                                </div>

                                <div class="d-flex justify-content-end gap-3">
                                    <button type="submit" onclick="disableButtons()" name="action_type" value="save"
                                        id="save" class="btn btn-primary" style="background-color: #7fa0b0;">Save Draft</button>

                                    <button type="submit" onclick="disableButtons()" name="action_type" value="confirm"
                                        id="confirm" class="btn btn-primary">Confirm Blast ✨</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#emailContent').summernote({
                height: 300,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });

        const form = document.getElementById('create-email-form');
        const saveButton = document.getElementById('save');
        const confirmButton = document.getElementById('confirm');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log("Form submitted exactly once.");
        }, { once: true });

        var socket = io()
        socket.on('button_enabled', function (data) {
            if (data.status === 'True') {
                document.getElementById('submit').disabled = false;
            }
        });
        socket.on('confirmation_channel', function (data) {
            document.getElementById('confirmation_counter').innerText = data.amount;
        });
    </script>
</body>
</html>
